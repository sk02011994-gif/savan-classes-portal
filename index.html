<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAVAN CLASSES Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#0f172a;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:#f1f5f9;
}

.card{
  background:#1e293b;
  padding:35px;
  width:90%;
  max-width:380px;
  border-radius:16px;
  box-shadow:0 0 30px rgba(251,191,36,0.15);
  text-align:center;
}

h1{
  color:#fbbf24;
  margin-bottom:5px;
}

.subtitle{
  font-size:13px;
  opacity:0.7;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:none;
  background:#0f172a;
  color:#fff;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#fbbf24;
  font-weight:600;
  cursor:pointer;
}

.footer{
  margin-top:25px;
  font-size:12px;
  opacity:0.6;
}
</style>
</head>

<body>

<div class="card">
  <h1>SAVAN CLASSES</h1>
  <div class="subtitle">Phone OTP Login</div>

  <input type="text" id="phone" placeholder="Enter Phone (without +91)">
  <div id="recaptcha-container"></div>
  <button onclick="sendOTP()">Send OTP</button>

  <input type="text" id="otp" placeholder="Enter OTP">
  <button onclick="verifyOTP()">Verify OTP</button>

  <p id="status"></p>

  <div class="footer">
    Bajrang Ward, Bhatapara <br>
    📞 8839940549 <br>
    📧 savanclasses.bhatapara@gmail.com <br>
    Mentor: Sagar Kesharwani
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBG4iWrIN8rHYvFGu05gXBRBBHjipWdIdg",
  authDomain: "savan-b0f12.firebaseapp.com",
  projectId: "savan-b0f12",
  storageBucket: "savan-b0f12.firebasestorage.app",
  messagingSenderId: "329716200488",
  appId: "1:329716200488:web:c2cf11d9a3a3887372311d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
  size: 'normal',
});

window.sendOTP = function(){
  const phoneNumber = "+91" + document.getElementById("phone").value;

  signInWithPhoneNumber(auth, phoneNumber, window.recaptchaVerifier)
  .then((confirmationResult) => {
    window.confirmationResult = confirmationResult;
    document.getElementById("status").innerText = "OTP Sent!";
  }).catch((error) => {
    document.getElementById("status").innerText = error.message;
  });
}

window.verifyOTP = function(){
  const code = document.getElementById("otp").value;

  window.confirmationResult.confirm(code).then(async (result) => {

    const phone = result.user.phoneNumber.replace("+91","");

    const docRef = doc(db, "users", phone);
    const docSnap = await getDoc(docRef);

    if (docSnap.exists()) {
      const role = docSnap.data().role;

      if(role === "admin"){
        alert("Admin Logged In");
      } else {
        alert("User Logged In");
      }
    } else {
      alert("Access Not Granted");
    }

  }).catch((error) => {
    document.getElementById("status").innerText = "Invalid OTP";
  });
}

</script>

</body>
</html>
